{if condition="$__PAGING__.record_total gt 0"}
<nav class="paging" aria-label="分页导航">
    <a class="paging-link paging-edge{if condition="$__PAGING__['page_current'] eq 1"} disabled{/if}" href="{$__PAGING__.page_url|mac_url_page=1}">首页</a>
    <a class="paging-link{if condition="$__PAGING__['page_current'] eq 1"} disabled{/if}" href="{$__PAGING__.page_url|mac_url_page=$__PAGING__.page_prev}">上一页</a>
    {maccms:foreach name="$__PAGING__.page_num" id="num"}
    <a class="paging-link paging-number{if condition="$__PAGING__['page_current'] eq $num"} active{/if}" href="{$__PAGING__.page_url|mac_url_page=$num}">{$num}</a>
    {/maccms:foreach}
    <a class="paging-link{if condition="$__PAGING__['page_current'] eq $__PAGING__.page_total"} disabled{/if}" href="{$__PAGING__.page_url|mac_url_page=$__PAGING__.page_next}">下一页</a>
    <a class="paging-link paging-edge{if condition="$__PAGING__['page_current'] eq $__PAGING__.page_total"} disabled{/if}" href="{$__PAGING__.page_url|mac_url_page=$__PAGING__.page_total}">尾页</a>
    <span class="paging-info">{$__PAGING__.page_current} / {$__PAGING__.page_total}</span>
</nav>
{/if}
