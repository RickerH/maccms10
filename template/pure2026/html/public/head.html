<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>{$maccms.site_name|mac_default='pure2026'}{notempty name="$obj.vod_name"} - {$obj.vod_name}{/notempty}</title>
    {include file="public/seo_detail_meta" /}
    <script>
    (function(){
      try {
        var theme = localStorage.getItem('theme');
        if (theme === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      } catch(e) {}
    })();
    </script>
    <link rel="stylesheet" href="{$maccms.path_tpl}/asset/css/index.css">
    {include file="public/include" /}
</head>
<body>
<nav class="site-nav show-pc">
    <a href="{$maccms.path}" class="nav-logo">{$maccms.site_name}</a>
    <div class="nav-links">
        <a href="{$maccms.path}" class="nav-link active" aria-current="page">首页</a>
        <a href="{:mac_url('vod/type',['id'=>1])}" class="nav-link">电影</a>
        <a href="{:mac_url('vod/type',['id'=>2])}" class="nav-link">剧集</a>
        <a href="{:mac_url('vod/type',['id'=>3])}" class="nav-link">动漫</a>
        <a href="{:mac_url('vod/type',['id'=>4])}" class="nav-link">综艺</a>
    </div>
    <div class="nav-actions">
        <form class="nav-search" action="{:mac_url('vod/search')}">
            <input name="wd" type="text" placeholder="搜索影片…">
        </form>
        <div class="nav-auth" aria-label="会员入口">
            {if condition="isset($user) and !empty($user['user_id'])"}
            <a href="{:mac_url('user/index')}" class="nav-user-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>{$user.user_nick_name|mac_default=$user.user_name}</span>
            </a>
            {else/}
            <a href="{:mac_url('user/login')}" class="nav-auth-link">登录</a>
            <a href="{:mac_url('user/reg')}" class="nav-auth-link nav-auth-link--primary">注册</a>
            {/if}
        </div>
        <button class="theme-toggle" aria-label="切换亮暗模式">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>
</nav>

<nav class="site-nav show-wap">
    <a href="{$maccms.path}" class="nav-logo">{$maccms.site_name}</a>
    <div class="nav-actions">
        <button class="wap-search-trigger" aria-label="搜索">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="theme-toggle" aria-label="切换亮暗模式">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>
</nav>
