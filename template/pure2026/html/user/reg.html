{include file="public/head" /}

<main class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-card-title">{$maccms.site_name|mac_default='注册'}</h1>
    <p class="auth-card-sub">创建您的账号</p>

    <form id="fm-reg" class="auth-form" autocomplete="off" novalidate>
      <div class="auth-field">
        <label class="auth-label" for="reg_user_name">账号</label>
        <input class="auth-input" type="text" id="reg_user_name" name="user_name"
               placeholder="输入您的登录账号" autocomplete="username">
      </div>
      <div class="auth-field">
        <label class="auth-label" for="reg_user_pwd">密码</label>
        <input class="auth-input" type="password" id="reg_user_pwd" name="user_pwd"
               placeholder="设置您的登录密码" autocomplete="new-password">
      </div>
      <div class="auth-field">
        <label class="auth-label" for="reg_user_pwd2">确认密码</label>
        <input class="auth-input" type="password" id="reg_user_pwd2" name="user_pwd2"
               placeholder="再次输入密码" autocomplete="new-password">
      </div>
      <div class="auth-field">
        <label class="auth-label" for="invite_code">邀请码 <span class="auth-optional">（可选）</span></label>
        <input class="auth-input" type="text" id="invite_code" name="invite_code"
               placeholder="邀请码（可选）"
               value="{$param.invite_code|default=''}" autocomplete="off">
      </div>

      {if condition="$user_config.reg_phone_sms neq 0"}
      <input type="hidden" name="ac" value="phone">
      <div class="auth-field">
        <label class="auth-label" for="reg_to">手机号码</label>
        <div class="auth-captcha-row">
          <input class="auth-input auth-captcha-input" type="tel" id="reg_to" name="to"
                 placeholder="请输入手机号码" autocomplete="tel">
          <button type="button" class="auth-send-code" id="btn_send_sms">发送验证码</button>
        </div>
      </div>
      <div class="auth-field">
        <label class="auth-label" for="reg_code">短信验证码</label>
        <input class="auth-input" type="text" id="reg_code" name="code"
               placeholder="请输入短信验证码" autocomplete="one-time-code">
      </div>
      {elseif condition="$user_config.reg_email_sms neq 0"}
      <input type="hidden" name="ac" value="email">
      <div class="auth-field">
        <label class="auth-label" for="reg_to">邮箱地址</label>
        <div class="auth-captcha-row">
          <input class="auth-input auth-captcha-input" type="email" id="reg_to" name="to"
                 placeholder="请输入邮箱地址" autocomplete="email">
          <button type="button" class="auth-send-code" id="btn_send_sms">发送验证码</button>
        </div>
      </div>
      <div class="auth-field">
        <label class="auth-label" for="reg_code">邮箱验证码</label>
        <input class="auth-input" type="text" id="reg_code" name="code"
               placeholder="请输入邮箱验证码" autocomplete="one-time-code">
      </div>
      {/if}

      {if condition="$user_config.reg_verify neq 0"}
      <div class="auth-field">
        <label class="auth-label" for="verify_reg">图片验证码</label>
        <div class="auth-captcha-row">
          <input class="auth-input auth-captcha-input" type="text" id="verify_reg" name="verify"
                 placeholder="请输入验证码" autocomplete="off">
          <img class="auth-captcha-img" id="verify_img_reg"
               src="{:url('verify/index')}"
               onclick="this.src=this.src+'?'" alt="点击刷新验证码" title="点击刷新">
        </div>
      </div>
      {/if}

      <p class="auth-error" id="reg_error" aria-live="polite"></p>
      <button class="auth-submit button-primary" id="btn_reg" type="button">立即注册</button>
    </form>

    <p class="auth-switch">已有账号？<a href="{:mac_url('user/login')}">立即登录</a></p>
  </div>
</main>

<script>
(function() {
  document.addEventListener('DOMContentLoaded', function() {
    var form    = document.getElementById('fm-reg');
    var btn     = document.getElementById('btn_reg');
    var errEl   = document.getElementById('reg_error');
    var verImg  = document.getElementById('verify_img_reg');
    var btnSms  = document.getElementById('btn_send_sms');

    function showError(msg) {
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }
    function clearError() {
      errEl.style.display = 'none';
      errEl.textContent = '';
    }
    function serializeForm(f) {
      var pairs = [];
      var fields = f.querySelectorAll('input[name]');
      for (var i = 0; i < fields.length; i++) {
        pairs.push(encodeURIComponent(fields[i].name) + '=' + encodeURIComponent(fields[i].value));
      }
      return pairs.join('&');
    }

    /* 发送短信/邮件验证码 */
    if (btnSms) {
      var countdown = 0;
      var timer = null;
      function startCountdown() {
        countdown = 60;
        btnSms.disabled = true;
        timer = setInterval(function() {
          countdown--;
          btnSms.textContent = '重新发送(' + countdown + ')';
          if (countdown <= 0) {
            clearInterval(timer);
            btnSms.disabled = false;
            btnSms.textContent = '发送验证码';
          }
        }, 1000);
      }
      btnSms.addEventListener('click', function() {
        var acInput = form.querySelector('input[name="ac"]');
        var toInput = document.getElementById('reg_to');
        var ac = acInput ? acInput.value : '';
        var to = toInput ? toInput.value.replace(/^\s+|\s+$/g, '') : '';
        if (ac === 'phone' && !/^1[0-9]{10}$/.test(to)) {
          showError('请输入有效的手机号码'); return;
        }
        if (ac === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(to)) {
          showError('请输入有效的邮箱地址'); return;
        }
        startCountdown();
        var xhr = new XMLHttpRequest();
        xhr.open('POST', '{:url("user/reg_msg")}', true);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
        xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
        xhr.onload = function() {
          try {
            var r = JSON.parse(xhr.responseText);
            if (r.code !== 1) showError(r.msg || '发送失败，请稍后再试');
          } catch (e) {}
        };
        xhr.send('ac=' + encodeURIComponent(ac) + '&to=' + encodeURIComponent(to));
      });
    }

    form.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { btn.click(); }
    });

    btn.addEventListener('click', function() {
      clearError();
      var nameVal  = form.querySelector('#reg_user_name').value.replace(/^\s+|\s+$/g, '');
      var pwdVal   = form.querySelector('#reg_user_pwd').value;
      var pwd2Val  = form.querySelector('#reg_user_pwd2').value;
      var verEl    = form.querySelector('#verify_reg');

      if (!nameVal) { showError('请输入账号'); form.querySelector('#reg_user_name').focus(); return; }
      if (!pwdVal)  { showError('请输入密码'); form.querySelector('#reg_user_pwd').focus(); return; }
      if (!pwd2Val) { showError('请输入确认密码'); form.querySelector('#reg_user_pwd2').focus(); return; }
      if (pwdVal !== pwd2Val) { showError('两次输入的密码不一致'); form.querySelector('#reg_user_pwd2').focus(); return; }
      if (verEl && !verEl.value.replace(/^\s+|\s+$/g, '')) {
        showError('请输入验证码'); verEl.focus(); return;
      }

      btn.disabled = true;
      btn.textContent = '注册中…';

      var xhr = new XMLHttpRequest();
      xhr.open('POST', '{:url("user/reg")}', true);
      xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
      xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
      xhr.onload = function() {
        btn.disabled = false;
        btn.textContent = '立即注册';
        try {
          var r = JSON.parse(xhr.responseText);
          if (r.code === 1) {
            location.href = '{:url("user/index")}';
          } else {
            showError(r.msg || '注册失败，请稍后再试');
            if (verImg) { verImg.src = verImg.src.split('?')[0] + '?' + Date.now(); }
          }
        } catch (e) {
          showError('网络异常，请稍后再试');
        }
      };
      xhr.onerror = function() {
        btn.disabled = false;
        btn.textContent = '立即注册';
        showError('网络异常，请稍后再试');
      };
      xhr.send(serializeForm(form));
    });
  });
})();
</script>

{include file="public/foot" /}
